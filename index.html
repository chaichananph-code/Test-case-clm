<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TC Tracker — Claim Prop Testing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --paper:#F4F5FC;
    --paper-2:#EAEBFA;
    --ink:#1E1B3A;
    --ink-soft:#6B6F8F;
    --navy:#4F46E5;
    --navy-2:#9333EA;
    --rust:#EC4899;
    --rust-soft:#FCE7F3;
    --line:#E1E3F5;
    --card:#FFFFFF;
    --shadow: 0 1px 2px rgba(79,70,229,0.06);
    --radius: 10px;
  }
  [data-theme="dark"]{
    --paper:#0F1020;
    --paper-2:#171933;
    --ink:#ECEBFF;
    --ink-soft:#9B9BC7;
    --navy:#818CF8;
    --navy-2:#C084FC;
    --rust:#F472B6;
    --rust-soft:#3B1E33;
    --line:#2A2C4E;
    --card:#1B1D3A;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    transition:background .25s, color .25s;
  }
  .topbar{
    background:linear-gradient(120deg, #4338CA 0%, #6D28D9 55%, #9333EA 100%);
    color:#F5F3FF;
    padding:26px 28px 20px;
    position:relative;
    overflow:hidden;
  }
  [data-theme="dark"] .topbar{ background:linear-gradient(120deg, #1E1B4B 0%, #3B2A6B 55%, #4C1D6B 100%); color:var(--ink); border-bottom:1px solid var(--line);}
  .topbar::after{
    content:"";
    position:absolute; right:-60px; top:-60px; width:220px; height:220px;
    background:radial-gradient(circle, rgba(255,255,255,0.16), transparent 70%);
    border-radius:50%;
  }
  .topbar::before{
    content:"";
    position:absolute; left:20%; bottom:-80px; width:200px; height:200px;
    background:radial-gradient(circle, rgba(236,72,153,0.25), transparent 70%);
    border-radius:50%;
  }
  .topbar-inner{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap; position:relative; z-index:1;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    opacity:.75; margin:0 0 6px;
  }
  h1{
    font-family:'Inter',sans-serif; font-weight:800; letter-spacing:-.02em;
    font-size:28px; margin:0;
  }
  .stamp-toggle{
    display:flex; align-items:center; gap:10px;
    font-family:'IBM Plex Mono',monospace; font-size:12px;
  }
  #themeBtn, .upload-btn{
    background:transparent; border:1px solid rgba(255,255,255,0.5); color:inherit;
    padding:7px 12px; border-radius:999px; cursor:pointer; font-family:inherit; font-size:12px;
    display:inline-block;
  }
  [data-theme="dark"] #themeBtn, [data-theme="dark"] .upload-btn{ border-color: var(--line); }
  #themeBtn:hover, .upload-btn:hover{ background:rgba(255,255,255,0.14); }
  .data-info{
    margin:10px 0 0; font-family:'IBM Plex Mono',monospace; font-size:11px; opacity:.6;
    display:flex; gap:14px; align-items:center;
  }
  .data-info a{ color:inherit; opacity:.85; }
  .data-info a:hover{ opacity:1; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--navy); color:var(--paper); padding:12px 20px; border-radius:8px;
    font-family:'Inter',sans-serif; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,0.2);
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:60;
    max-width:80vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.error{ background:var(--rust); }

  .status-strip{
    display:flex; gap:22px; margin-top:16px; flex-wrap:wrap;
  }
  .status-strip .metric{ }
  .status-strip .num{ font-family:'Inter',sans-serif; font-size:22px; font-weight:800; line-height:1;}
  .status-strip .lbl{ font-size:11px; opacity:.7; margin-top:3px; font-family:'IBM Plex Mono',monospace; letter-spacing:.05em;}

  .wrap{ max-width:1180px; margin:0 auto; padding:24px 28px 60px; }

  .tabs{
    display:flex; gap:2px; flex-wrap:wrap; margin-bottom:0;
    border-bottom:2px solid var(--line);
  }
  .tab{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:10px 16px 9px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-bottom:none;
    border-top:3px solid transparent;
    border-radius:8px 8px 0 0;
    cursor:pointer;
    color:var(--ink-soft);
    position:relative;
    top:2px;
    white-space:nowrap;
  }
  .tab .count{
    display:inline-block; margin-left:6px; padding:1px 6px;
    background:var(--accent-soft, var(--line)); color:var(--accent, var(--ink)); border-radius:999px; font-size:10.5px; font-weight:600;
  }
  .tab.active{
    background:var(--card); color:var(--ink); border-color:var(--line);
    border-top-color:var(--accent, var(--navy));
    border-bottom:2px solid var(--card); font-weight:700;
  }
  .tab.active .count{ background:var(--accent, var(--rust)); color:#fff; }
  .tab:hover:not(.active){ color:var(--ink); }

  .search-row{
    display:flex; gap:10px; align-items:center; margin:18px 0 16px; flex-wrap:wrap;
  }
  #searchInput{
    flex:1; min-width:220px;
    font-family:'Inter',sans-serif; font-size:13.5px;
    padding:10px 14px; border:1px solid var(--line); border-radius:8px;
    background:var(--card); color:var(--ink);
  }
  #searchInput:focus{ outline:2px solid var(--navy); outline-offset:1px; }
  .search-hint{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft);}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
    gap:12px;
  }
  .grid{
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
  }
  .tc-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 12px;
    cursor:pointer;
    box-shadow:var(--shadow);
    position:relative;
    transition:transform .14s, box-shadow .14s, border-color .14s;
    text-align:center;
  }
  .tc-card::before{
    content:"";
    position:absolute; left:0; top:14px; bottom:14px; width:3px;
    background:var(--accent, var(--rust)); border-radius:0 3px 3px 0;
    opacity:.9;
  }
  .tc-card:hover{
    transform:translateY(-3px);
    border-color:var(--accent, var(--rust));
    box-shadow:0 10px 20px -6px var(--accent-soft, rgba(79,70,229,0.25));
  }
  .tc-id{
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13.5px;
    color:var(--accent, var(--navy-2)); letter-spacing:.01em;
  }

  .empty{
    padding:40px 20px; text-align:center; color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace; font-size:13px;
    border:1px dashed var(--line); border-radius:8px;
  }

  /* side panel */
  .overlay{
    position:fixed; inset:0; background:rgba(20,17,12,0.35);
    opacity:0; pointer-events:none; transition:opacity .2s; z-index:40;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .panel{
    position:fixed; top:0; right:0; height:100%; width:min(420px, 92vw);
    background:var(--card); border-left:1px solid var(--line);
    box-shadow:-8px 0 24px rgba(0,0,0,0.12);
    transform:translateX(100%); transition:transform .25s ease;
    z-index:41; overflow-y:auto;
  }
  .panel.show{ transform:translateX(0); }
  .panel-head{
    background:linear-gradient(135deg, var(--accent, var(--navy)), color-mix(in srgb, var(--accent, var(--navy)) 60%, var(--navy-2)));
    color:#fff; padding:20px 22px;
    position:relative;
  }
  [data-theme="dark"] .panel-head{ color:#fff; }
  .panel-close{
    position:absolute; top:16px; right:16px; background:none; border:none;
    color:inherit; font-size:20px; cursor:pointer; opacity:.75; line-height:1; padding:4px;
  }
  .panel-close:hover{ opacity:1; }
  .panel-tcid{ font-family:'IBM Plex Mono',monospace; font-size:12px; opacity:.8; margin-bottom:6px;}
  .panel-title{ font-family:'Inter',sans-serif; font-size:19px; font-weight:700; line-height:1.35; padding-right:24px;}
  .panel-body{ padding:20px 22px 40px; }
  .field{ margin-bottom:18px; }
  .field-lbl{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--ink-soft); margin-bottom:5px;
  }
  .field-val{ font-size:14px; line-height:1.55; color:var(--ink); }
  .badge-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .badge{
    font-family:'IBM Plex Mono',monospace; font-size:11px;
    padding:4px 10px; border-radius:999px; border:1px solid var(--line); color:var(--ink-soft);
  }

  @media (max-width:600px){
    .topbar{ padding:18px 18px 14px; }
    .wrap{ padding:18px 16px 50px; }
    h1{ font-size:22px; }
  }
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="topbar-inner">
    <div>
      <p class="eyebrow">NCBS · Claim Prop Testing</p>
      <h1>Test Case Tracker</h1>
    </div>
    <div class="stamp-toggle">
      <label for="csvInput" class="upload-btn">⭱ อัปเดตข้อมูล</label>
      <input type="file" id="csvInput" accept=".csv" style="display:none;">
      <button id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
    </div>
  </div>
  <div class="status-strip">
    <div class="metric"><div class="num" id="totalCount">0</div><div class="lbl">TC ทั้งหมด</div></div>
    <div class="metric"><div class="num" id="scenarioCount">0</div><div class="lbl">Scenario</div></div>
    <div class="metric"><div class="num" id="inProgressCount">0</div><div class="lbl">In Progress</div></div>
  </div>
  <p class="data-info" id="dataInfo">
    <span id="dataInfoText"></span>
    <a href="#" id="resetLink" onclick="resetToDefault(event)">ล้างข้อมูล/กลับค่าเดิม</a>
  </p>
</div>
<div class="toast" id="toast"></div>

<div class="wrap">
  <div class="tabs" id="tabs"></div>

  <div class="search-row">
    <input id="searchInput" type="text" placeholder="ค้นหา Test Case ID หรือชื่อ...">
    <span class="search-hint" id="resultHint"></span>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none;">ไม่พบ Test Case ที่ตรงกับคำค้นหา</div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-head" id="panelHead">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <p class="panel-tcid" id="panelTcId"></p>
    <p class="panel-title" id="panelTitle"></p>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

const STORAGE_KEY = 'tcTrackerData_v1';

let TC_DATA = [];
let dataSourceLabel = '';

function loadInitialData(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      const parsed = JSON.parse(saved);
      TC_DATA = parsed.rows;
      dataSourceLabel = `อัปเดตล่าสุด: ${parsed.updatedAt} (จากไฟล์ที่อัปโหลด)`;
      return;
    }
  }catch(e){ /* fall through to default */ }
  TC_DATA = DEFAULT_DATA;
  dataSourceLabel = 'ข้อมูลตั้งต้น (ยังไม่เคยอัปเดต)';
}

let activeScenario = "ALL";
let searchTerm = "";

const SCENARIO_COLORS = ['#6366F1','#EC4899','#F59E0B','#10B981','#06B6D4','#8B5CF6','#EF4444'];
function hexToRgba(hex, alpha){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function colorForScenario(name){
  const names = scenarioList().map(s=>s[0]);
  const idx = Math.max(0, names.indexOf(name));
  return SCENARIO_COLORS[idx % SCENARIO_COLORS.length];
}
function accentStyle(scenarioName){
  const c = colorForScenario(scenarioName);
  return `--accent:${c}; --accent-soft:${hexToRgba(c, document.body.getAttribute('data-theme')==='dark' ? 0.22 : 0.14)};`;
}

function toggleTheme(){
  const html = document.body;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙 Dark' : '☀️ Light';
}

function scenarioList(){
  const map = {};
  TC_DATA.forEach(tc => { map[tc.scenarioName] = (map[tc.scenarioName]||0) + 1; });
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
}

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  const scenarios = scenarioList();
  let html = `<div class="tab ${activeScenario==='ALL'?'active':''}" onclick="setScenario('ALL')">ทั้งหมด <span class="count">${TC_DATA.length}</span></div>`;
  scenarios.forEach(([name,count])=>{
    html += `<div class="tab ${activeScenario===name?'active':''}" style="${accentStyle(name)}" onclick="setScenario('${name.replace(/'/g,"\\'")}')">${escapeHtml(name)} <span class="count">${count}</span></div>`;
  });
  tabsEl.innerHTML = html;
}

function setScenario(name){
  activeScenario = name;
  renderTabs();
  renderGrid();
}

function filteredData(){
  return TC_DATA.filter(tc=>{
    const matchScenario = activeScenario==='ALL' || tc.scenarioName===activeScenario;
    const term = searchTerm.trim().toLowerCase();
    const matchSearch = !term || tc.tcId.toLowerCase().includes(term) || tc.tcName.toLowerCase().includes(term);
    return matchScenario && matchSearch;
  });
}

function renderGrid(){
  const data = filteredData();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  document.getElementById('resultHint').textContent = `${data.length} รายการ`;

  if(data.length===0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = data.map((tc)=>{
    return `
    <div class="tc-card" style="${accentStyle(tc.scenarioName)}" onclick="openPanel('${tc.issueKey}')">
      <div class="tc-id">${escapeHtml(tc.tcId)}</div>
    </div>`;
  }).join('');
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openPanel(issueKey){
  const tc = TC_DATA.find(t=>t.issueKey===issueKey);
  if(!tc) return;
  document.getElementById('panelHead').setAttribute('style', accentStyle(tc.scenarioName));
  document.getElementById('panelTcId').textContent = tc.tcId;
  document.getElementById('panelTitle').textContent = tc.tcName;

  const body = document.getElementById('panelBody');
  body.innerHTML = `
    <div class="field">
      <div class="field-lbl">Summary</div>
      <div class="field-val">${escapeHtml(tc.summary)}</div>
    </div>
    ${tc.description ? `<div class="field">
      <div class="field-lbl">Description</div>
      <div class="field-val">${escapeHtml(tc.description)}</div>
    </div>` : ''}
    <div class="field">
      <div class="field-lbl">Test Scenario</div>
      <div class="field-val">${escapeHtml(tc.scenarioId)} — ${escapeHtml(tc.scenarioName)}</div>
    </div>
    <div class="field">
      <div class="field-lbl">รายละเอียด</div>
      <div class="badge-row">
        <span class="badge">Phase: ${escapeHtml(tc.phase||'-')}</span>
        <span class="badge">Priority: ${escapeHtml(tc.priority||'-')}</span>
        <span class="badge">Status: ${escapeHtml(tc.status||'-')}</span>
      </div>
    </div>
    <div class="field">
      <div class="field-lbl">Tester</div>
      <div class="field-val">${escapeHtml(tc.tester||'-')}</div>
    </div>
    <div class="field">
      <div class="field-lbl">Jira Issue Key</div>
      <div class="field-val">${escapeHtml(tc.issueKey)}</div>
    </div>
  `;

  document.getElementById('panel').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function closePanel(){
  document.getElementById('panel').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') closePanel();
});

document.getElementById('searchInput').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  renderGrid();
});

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=> t.classList.remove('show'), 3500);
}

// แปลงหัวคอลัมน์ CSV จาก Jira ให้เป็นโครงสร้างข้อมูลที่หน้าเว็บใช้
const FIELD_MAP = {
  tcId: 'Custom field (Test Case ID)',
  tcName: 'Custom field (Test Case Name)',
  summary: 'Summary',
  description: 'Description',
  scenarioId: 'Custom field (Test Scenario ID)',
  scenarioName: 'Custom field (Test Scenario Name)',
  phase: 'Custom field (Test Phase)',
  priority: 'Priority',
  tester: 'Custom field (Tester Name)',
  status: 'Status',
  issueKey: 'Issue key',
};

function mapRow(row){
  const out = {};
  Object.entries(FIELD_MAP).forEach(([key, col])=>{
    out[key] = (row[col] || '').toString().trim();
  });
  return out;
}

function handleCsvFile(file){
  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    encoding: 'UTF-8',
    complete: function(results){
      const rows = results.data.map(mapRow).filter(r => r.tcId);
      if(rows.length === 0){
        showToast('ไม่พบข้อมูล Test Case ในไฟล์นี้ ตรวจสอบว่า export คอลัมน์ครบไหม', true);
        return;
      }
      const now = new Date();
      const stamp = now.toLocaleDateString('th-TH', {day:'2-digit', month:'short', year:'numeric'}) + ' ' + now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ rows, updatedAt: stamp }));
      }catch(e){
        showToast('บันทึกลง localStorage ไม่สำเร็จ (ไฟล์อาจใหญ่ไป) แต่ยังใช้ข้อมูลนี้ได้ในหน้านี้', true);
      }
      TC_DATA = rows;
      dataSourceLabel = `อัปเดตล่าสุด: ${stamp} (จากไฟล์ที่อัปโหลด)`;
      activeScenario = 'ALL';
      searchTerm = '';
      document.getElementById('searchInput').value = '';
      refreshAll();
      showToast(`อัปเดตข้อมูลสำเร็จ — โหลดมา ${rows.length} รายการ`);
    },
    error: function(err){
      showToast('อ่านไฟล์ CSV ไม่สำเร็จ: ' + err.message, true);
    }
  });
}

document.getElementById('csvInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(file) handleCsvFile(file);
  e.target.value = '';
});

function refreshAll(){
  document.getElementById('totalCount').textContent = TC_DATA.length;
  document.getElementById('scenarioCount').textContent = scenarioList().length;
  document.getElementById('inProgressCount').textContent = TC_DATA.filter(t=>t.status==='In Progress').length;
  document.getElementById('dataInfoText').textContent = dataSourceLabel;
  renderTabs();
  renderGrid();
}

function resetToDefault(e){
  e.preventDefault();
  if(!confirm('ล้างข้อมูลที่อัปโหลดไว้ แล้วกลับไปใช้ข้อมูลตั้งต้นของไฟล์นี้?')) return;
  localStorage.removeItem(STORAGE_KEY);
  TC_DATA = DEFAULT_DATA;
  dataSourceLabel = 'ข้อมูลตั้งต้น (ยังไม่เคยอัปเดต)';
  activeScenario = 'ALL';
  searchTerm = '';
  document.getElementById('searchInput').value = '';
  refreshAll();
  showToast('รีเซ็ตกลับไปใช้ข้อมูลตั้งต้นแล้ว');
}

function init(){
  loadInitialData();
  refreshAll();
}
init();
</script>
